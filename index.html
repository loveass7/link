<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    width:360px;
    max-width:95%;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:24px;
    padding:35px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    margin:auto;
    object-fit:cover;
    border:4px solid rgba(255,255,255,.2);
}

h1{
    margin-top:18px;
    font-size:28px;
}

p{
    color:#d1d5db;
    margin:10px 0 30px;
}

.link{
    display:block;
    text-decoration:none;
    color:white;
    padding:16px;
    margin:14px 0;
    border-radius:14px;
    background:rgba(255,255,255,.08);
    transition:.3s;
    font-weight:600;
}

.link:hover{
    background:#3b82f6;
    transform:translateY(-4px);
}

.footer{
    margin-top:25px;
    color:#94a3b8;
    font-size:13px;
}
</style>

</head>
<body>

<div class="card">

<img class="avatar"
src="https://i.pravatar.cc/200"
alt="Profile">

<h1>Ai Created</h1>

<p>Developer • Creator • Designer</p>

<a class="link" href="https://photos.app.goo.gl/R2wy6kXa692tCRJF6" target="_blank">
Æ
</a>

<a class="link" href="https://photos.app.goo.gl/3MTZcZYXHWJ4pbkU8" target="_blank">
P
</a>

<a class="link" href="https://photos.app.goo.gl/gmoseSkjxzHSdAzm7" target="_blank">

</a>

<a class="link" href="https://photos.app.goo.gl/R2wy6kXa692tCRJF6" target="_blank">
MB
</a>

<div class="footer">
Made 4 pics
</div>

</div>

</body>
</html>
